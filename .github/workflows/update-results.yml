name: Update results

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update actual results
        run: node scripts/update-results.mjs

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update live World Cup data
          file_pattern: actual-results.json knockout-results.json top-scorers.json
